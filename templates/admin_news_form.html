{% extends "base.html" %}
{% block title %}{{ '编辑新闻' if article else '发布新闻' }}{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">{{ '编辑新闻' if article else '发布新闻' }}</h1>
    <a href="{{ url_for('admin_news') }}" class="text-sm text-gray-500 hover:text-gray-700 px-3 py-2">← 返回列表</a>
</div>

<form method="POST" class="max-w-4xl">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                <select name="category" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-se-500 focus:border-se-500 outline-none text-sm">
                    {% set cats = [('news', '新闻发布'), ('project', '项目动态'), ('notice', '公告通知'), ('industry', '行业资讯')] %}
                    {% for val, label in cats %}
                    <option value="{{ val }}" {{ 'selected' if article and article.category == val }}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex items-end">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="published" value="1"
                        {{ 'checked' if not article or article.published }}
                        class="h-4 w-4 text-se-500 border-gray-300 rounded focus:ring-se-500">
                    <span class="text-sm text-gray-700">发布（取消勾选为草稿）</span>
                </label>
            </div>
        </div>

        <div class="border-t border-gray-200 pt-4">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">日本語</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">タイトル（标题）<span class="text-red-500">*</span></label>
                    <input type="text" name="title_ja" required
                        value="{{ article.title_ja if article else '' }}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-se-500 focus:border-se-500 outline-none text-sm"
                        placeholder="日语标题">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">本文（正文）<span class="text-red-500">*</span></label>
                    <textarea name="content_ja" required rows="8"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-se-500 focus:border-se-500 outline-none text-sm"
                        placeholder="日语正文内容（支持换行）">{{ article.content_ja if article else '' }}</textarea>
                </div>
            </div>
        </div>

        <div class="border-t border-gray-200 pt-4">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">中文</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标题</label>
                    <input type="text" name="title_zh"
                        value="{{ article.title_zh if article else '' }}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-se-500 focus:border-se-500 outline-none text-sm"
                        placeholder="中文标题（可选）">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">正文</label>
                    <textarea name="content_zh" rows="8"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-se-500 focus:border-se-500 outline-none text-sm"
                        placeholder="中文正文内容（可选）">{{ article.content_zh if article else '' }}</textarea>
                </div>
            </div>
        </div>

        <div class="border-t border-gray-200 pt-4 flex gap-3">
            <button type="submit" class="bg-se-500 hover:bg-se-600 text-white font-medium py-2 px-6 rounded-lg transition text-sm shadow-sm">
                {{ '保存修改' if article else '发布新闻' }}
            </button>
            <a href="{{ url_for('admin_news') }}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-6 rounded-lg transition text-sm">取消</a>
        </div>
    </div>
</form>
{% endblock %}
