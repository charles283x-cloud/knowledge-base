{% extends "base.html" %}
{% block title %}登录{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-se-500 rounded-2xl flex items-center justify-center mb-4">
                    <span class="text-white font-bold text-2xl">SE</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">项目知识库</h1>
                <p class="text-gray-500 mt-1">Shanghai Electric Japan</p>
            </div>

            <form method="POST" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-se-500 focus:border-se-500 outline-none transition"
                        placeholder="请输入用户名">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-se-500 focus:border-se-500 outline-none transition"
                        placeholder="请输入密码">
                </div>
                <button type="submit"
                    class="w-full bg-se-500 hover:bg-se-600 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-sm">
                    登 录
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
