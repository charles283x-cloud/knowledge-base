{% extends "base.html" %}
{% block title %}上传文档{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">上传文档</h1>

    <form method="POST" enctype="multipart/form-data" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">选择文件</label>
            <div id="drop-zone"
                class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-se-400 transition cursor-pointer">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                <p class="mt-3 text-sm text-gray-600">
                    <span class="text-se-500 font-medium">点击选择文件</span> 或将文件拖拽到此处
                </p>
                <p class="mt-1 text-xs text-gray-400">支持 .docx / .xlsx / .xls 格式，最大 16MB</p>
                <input type="file" id="file-input" name="file" accept=".docx,.xlsx,.xls" class="hidden" required>
            </div>
            <div id="file-info" class="mt-3 hidden">
                <div class="flex items-center bg-gray-50 rounded-lg px-4 py-3">
                    <svg class="w-5 h-5 text-se-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <span id="file-name" class="text-sm text-gray-700 flex-1 truncate"></span>
                    <button type="button" id="clear-file" class="text-gray-400 hover:text-red-500 ml-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">描述（可选）</label>
            <textarea id="description" name="description" rows="3"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-se-500 focus:border-se-500 outline-none transition resize-none"
                placeholder="简要描述文档内容..."></textarea>
        </div>

        <div class="flex justify-end gap-3">
            <a href="{{ url_for('index') }}" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">取消</a>
            <button type="submit" class="px-6 py-2 bg-se-500 hover:bg-se-600 text-white font-medium rounded-lg transition shadow-sm">
                上传
            </button>
        </div>
    </form>
</div>
{% endblock %}
